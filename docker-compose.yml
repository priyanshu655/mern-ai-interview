services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile

    container_name: interview-backend

    ports:
      - "8080:8080"

    env_file:
      - ./server/.env

    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile

    container_name: interview-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: unless-stopped